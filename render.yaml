services:
  - type: web
    name: clock-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ANTHROPIC_API_KEY
        sync: false      # set this in the Render dashboard, never commit it
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
